<!DOCTYPE html>
<html>
  <head>
    <title>Conway's Game of Life</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Game of Life">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/180.png">
    <style>
      html, body {
        margin: 0;
      }

      body {
        background-color: #000;
        overflow: hidden;
        font-family: Consolas, Menlo, monospace;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        touch-action: none;
        overscroll-behavior: none;
      }

      #no-webgl2 {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        color: #fff;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }

      #c {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      #status-overlay {
        position: fixed;
        bottom: 10px;
        right: 10px;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 1px;
        font-size: 10px;
        font-family: Consolas, Menlo, monospace;
        color: rgba(255, 255, 255, 0.6);
        background-color: rgba(0, 0, 0, 0.75);
        padding: 4px 6px;
        border-radius: 2px;
        transition: opacity 0.3s ease;
      }

      #status-overlay span { color: #af0; }

      .hide-status #status-overlay { display: none; }

      #texture-desc {
        position: fixed;
        bottom: 10px;
        left: 10px;
        color: #af0;
        font-size: 10px;
        font-family: Consolas, Menlo, monospace;
        background-color: rgba(0, 0, 0, 0.75);
        padding: 2px 6px;
        border-radius: 2px;
        opacity: 0;
        transition: transform 0.3s ease, opacity 0.3s ease;
        z-index: 10;
      }

      .toolbar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(0, 0, 0, 0.75);
        transform: translateY(100%);
        opacity: 0;
        transition: transform 0.3s ease, opacity 0.3s ease;
        pointer-events: none;
        z-index: 10;
      }

      .toolbar.visible {
        transform: translateY(0);
        opacity: 1;
        pointer-events: auto;
      }

      .toolbar-buttons {
        display: flex;
        align-items: flex-end;
        gap: 4px;
        padding: 8px;
      }

      .toolbar-buttons button {
        min-width: 44px;
        min-height: 44px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: #af0;
        font-size: 18px;
        cursor: pointer;
        border-radius: 4px;
        touch-action: manipulation;
        flex-shrink: 0;
      }

      #btn-play {
        border-radius: 50%;
        margin-right: 8px;
      }

      .ui-label {
        font-size: 9px;
        color: rgba(255, 255, 255, 0.5);
        text-transform: uppercase;
        letter-spacing: 1px;
        line-height: 1;
        margin-bottom: 2px;
      }

      .speed-control {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        margin: 0 4px;
      }

      .speed-control .speed-row {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .speed-control .speed-display {
        color: #af0;
        font-size: 14px;
        min-width: 50px;
        text-align: center;
        font-family: Consolas, Menlo, monospace;
      }

      .toolbar-gap { flex: 1; }

      .mode-toggles {
        display: flex;
        gap: 8px;
        margin: 0 8px;
      }

      .mode-toggle {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }

      .mode-buttons {
        display: flex;
        gap: 2px;
      }

      .mode-btn {
        min-width: 36px;
        min-height: 36px;
        font-size: 16px;
        opacity: 0.4;
      }

      .mode-btn.active {
        opacity: 1;
        border-color: #af0;
      }

      .settings-drawer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        max-width: 480px;
        border-radius: 4px 4px 0 0;
        margin: 0 auto;
        background: rgba(0, 0, 0, 0.85);
        color: rgba(255, 255, 255, 0.94);
        font-family: Consolas, Menlo, monospace;
        font-size: 12px;
        padding: 16px;
        touch-action: manipulation;
        transform: translateY(100%);
        opacity: 0;
        transition: transform 0.3s ease, opacity 0.3s ease;
        pointer-events: none;
        z-index: 11;
      }

      .settings-drawer.visible {
        transform: translateY(0);
        opacity: 1;
        pointer-events: auto;
      }

      .settings-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        font-size: 14px;
      }

      .settings-header button {
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.94);
        font-size: 18px;
        cursor: pointer;
      }

      .settings-checkbox {
        gap: 6px;
        margin-bottom: 4px;
      }

      .settings-link {
        background: none;
        border: none;
        color: #af0;
        font-family: Consolas, Menlo, monospace;
        font-size: 12px;
        cursor: pointer;
        padding: 8px 0;
        text-align: left;
        touch-action: manipulation;
      }

      .settings-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .settings-drawer label {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
        white-space: nowrap;
      }

      .settings-drawer input[type="range"] {
        flex: 1;
      }

      .settings-drawer span:last-child {
        min-width: 40px;
        text-align: right;
      }

      .menu-popup {
        position: fixed;
        bottom: 60px;
        right: 8px;
        background: rgba(0, 0, 0, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 4px;
        padding: 4px 0;
        z-index: 12;
        min-width: 200px;
        display: none;
        font-family: Consolas, Menlo, monospace;
      }

      .menu-popup.visible { display: block; }

      .menu-popup button,
      .menu-popup a {
        display: block;
        width: 100%;
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.9);
        font-family: Consolas, Menlo, monospace;
        font-size: 13px;
        padding: 10px 16px;
        text-align: left;
        cursor: pointer;
        touch-action: manipulation;
      }

      .menu-popup button:hover,
      .menu-popup a:hover { background: rgba(255, 255, 255, 0.1); }

      .menu-popup a { text-decoration: none; }

      .menu-popup .shortcut {
        color: rgba(255, 255, 255, 0.4);
        font-size: 11px;
      }

      .toolbar.visible ~ #status-overlay {
        opacity: 0;
      }

      /* toolbar open: show above toolbar */
      .toolbar.visible ~ #texture-desc {
        opacity: 1;
        transform: translateY(-56px);
      }

      /* toolbar closed + status visible: show at bottom */
      body:not(.hide-status) #texture-desc {
        opacity: 1;
      }

      /* toolbar closed + status hidden: hide (default opacity: 0 applies) */

      @media (display-mode: standalone) {
        /* keep canvas fullscreen in PWA mode, so safe area doesn't offset it */
        #c {
          top: 0;
          left: 0;
          transform: none;
        }
        .toolbar { padding-bottom: env(safe-area-inset-bottom, 0px); }
        .settings-drawer { padding-bottom: env(safe-area-inset-bottom, 0px); }
        .menu-popup { bottom: calc(60px + env(safe-area-inset-bottom, 0px)); }
        #status-overlay, #texture-desc {
          bottom: calc(10px + env(safe-area-inset-bottom, 0px));
        }
      }

      @media (display-mode: standalone) and (orientation: landscape),
             (pointer: coarse) and (orientation: landscape) {
        #c {
          width: 100vh;
          height: 100vw;
          overflow: hidden;
        }

        #c.landscape-left {
          transform: rotate(-90deg);
          transform-origin: left top;
          top: 100%;
          left: 0;
        }

        #c.landscape-right {
          transform: rotate(90deg);
          transform-origin: left top;
          top: 0;
          left: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="no-webgl2">
      <!-- iOS with experimental implements nothing of WebGL2 except the interface that falsely reports support :-( -->
      <!-- instead assume that the canvas will cover the "no WebGL2" message, and fade it in to give loading time -->
      <h1>:( sorry...WebGL2 is required</h1>
    </div>
    <canvas id="c"></canvas>
    <div id="toolbar" class="toolbar visible">
      <div class="toolbar-buttons">
        <button id="btn-play" title="Play / Pause [space]">⏸︎</button>
        <div class="speed-control">
          <span class="ui-label">speed</span>
          <div class="speed-row">
            <button id="btn-slower" title="Slower [↓/−]">−</button>
            <span id="speed-display" class="speed-display"></span>
            <button id="btn-faster" title="Faster [↑/+]">+</button>
          </div>
        </div>
        <div class="mode-toggles">
          <div class="mode-toggle">
            <span class="ui-label">observer</span>
            <div class="mode-buttons">
              <button id="btn-observer-touch" class="mode-btn active" title="Touch observer">👆</button>
              <button id="btn-observer-eye" class="mode-btn" title="Eye observer">👁️</button>
            </div>
          </div>
        </div>
        <div class="toolbar-gap"></div>
        <button id="btn-reset" title="Reload [shift+r]">↻</button>
        <button id="btn-fullscreen" title="Fullscreen [f]">⛶</button>
        <button id="btn-menu" title="Menu" aria-expanded="false" aria-haspopup="true">☰</button>
      </div>
    </div>
    <div id="menu-popup" class="menu-popup" role="menu">
      <a href="https://github.com/joeblynch/webgl2-game-of-life" target="_blank" role="menuitem">View on GitHub</a>
      <button id="menu-install" role="menuitem" style="display:none">Add to home screen</button>
      <button id="menu-replay" role="menuitem">Replay universe <span class="shortcut">[r]</span></button>
      <button id="menu-texture" role="menuitem">Change texture <span class="shortcut">[t]/[1-8]</span></button>
      <button id="menu-status" role="menuitem">Show status <span class="shortcut">[s]</span></button>
      <button id="menu-settings" role="menuitem">Settings</button>
    </div>
    <div id="settings-drawer" class="settings-drawer">
      <div class="settings-header">
        <span>Settings</span>
        <button id="btn-close-settings">✕</button>
      </div>
      <label>Dead brightness <input type="range" id="range-li-off" min="0" max="1" step="0.005"> <span id="val-li-off"></span></label>
      <label>Dead saturation <input type="range" id="range-sat-off" min="0" max="1" step="0.005"> <span id="val-sat-off"></span></label>
      <label>Alive brightness <input type="range" id="range-li-on" min="0" max="1" step="0.005"> <span id="val-li-on"></span></label>
      <label>Alive saturation <input type="range" id="range-sat-on" min="0" max="1" step="0.005"> <span id="val-sat-on"></span></label>
      <label>Starting cell size <input type="range" id="range-cell-size" min="1" max="20" step="1"> <span id="val-cell-size"></span></label>
      <label>Alive % <input type="range" id="range-alive" min="0" max="1" step="0.01"> <span id="val-alive"></span></label>
      <div class="settings-footer">
        <button id="btn-defaults" class="settings-link" title="Reset to defaults">Reset to defaults</button>
      </div>
    </div>
    <div id="texture-desc"></div>
    <div id="status-overlay">
      <div>fps <span id="fps">0</span></div>
      <div>active <span id="active">0</span></div>
    </div>
    <script src="lib/picogl.min.js"></script>
    <script src="main.js"></script>
    <script src="ui.js"></script>
  </body>
</html>
